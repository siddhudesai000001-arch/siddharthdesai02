services:
  - type: web
    name: sidlocker
    runtime: node
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy && node scripts/seed.js && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: file:/opt/render/project/data/sidlocker.db
      - key: UPLOADS_PATH
        value: /opt/render/project/data/uploads
      - key: NEXTAUTH_URL
        sync: false
        # IMPORTANT: Set this manually in Render dashboard to your full URL
        # e.g. https://sidlocker.onrender.com
      - key: NEXTAUTH_SECRET
        generateValue: true
      # Set these manually in Render dashboard:
      # AUTH_EMAIL
      # AUTH_USERNAME
      # AUTH_PASSWORD_HASH
    disk:
      name: sidlocker-data
      mountPath: /opt/render/project/data
      sizeGB: 10
